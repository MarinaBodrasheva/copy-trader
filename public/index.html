<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copy Trader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0f14;
      color: #cbd5e1;
      min-height: 100vh;
      font-size: 0.875rem;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: #131720;
      border-bottom: 1px solid #1e2433;
      flex-wrap: wrap;
    }

    .topbar-right { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.4rem 0.85rem;
      border-radius: 0.375rem;
      border: 1px solid #2a3144;
      background: #1a2035;
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #243050; color: #e2e8f0; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-red  { background: #7f1d1d; border-color: #991b1b; color: #fecaca; }
    .btn-red:hover { background: #991b1b; color: #fff; }
    .btn-icon { padding: 0.4rem 0.6rem; }

    /* ── Summary strip ── */
    .summary {
      display: flex;
      gap: 2rem;
      padding: 0.6rem 1.25rem;
      background: #131720;
      border-bottom: 1px solid #1e2433;
      font-size: 0.8rem;
      color: #64748b;
    }
    .summary span { color: #e2e8f0; font-weight: 600; margin-left: 0.3rem; }
    .summary .pos { color: #22c55e; }
    .summary .neg { color: #ef4444; }
    .summary-right { margin-left: auto; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; white-space: nowrap; }

    thead tr {
      background: #131720;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.07em;
      color: #475569;
    }

    th, td { padding: 0.7rem 1rem; text-align: left; border-bottom: 1px solid #1a2030; }
    th { font-weight: 600; }
    tbody tr:hover { background: #151c2a; }

    /* ── Status dot ── */
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      display: inline-block;
    }
    .dot.off { background: #475569; }

    /* ── Crown / toggle ── */
    .crown { font-size: 1rem; cursor: pointer; opacity: 0.35; transition: opacity 0.15s; }
    .crown.active { opacity: 1; }
    .crown:hover { opacity: 0.7; }

    .toggle-wrap { display: flex; align-items: center; }
    .toggle {
      position: relative; width: 36px; height: 20px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #2a3144;
      border-radius: 999px;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #64748b;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: #1d4ed8; }
    input:checked + .slider::before { transform: translateX(16px); background: #fff; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-locked { background: #7f1d1d; color: #fca5a5; }

    /* ── P&L colours ── */
    .pos { color: #22c55e; }
    .neg { color: #ef4444; }
    .neu { color: #475569; }

    /* ── Row action button ── */
    .btn-flat {
      padding: 0.25rem 0.65rem;
      background: #1e293b;
      color: #f87171;
      border: 1px solid #7f1d1d;
      border-radius: 0.3rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-flat:hover:not(:disabled) { background: #7f1d1d; color: #fff; }
    .btn-flat:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      padding: 0.6rem 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      color: #e2e8f0;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.err  { border-color: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <button class="btn" onclick="enableAll()">Enable all</button>
    <button class="btn" onclick="disableAll()">Disable all</button>
    <div class="topbar-right">
      <span id="status" style="font-size:0.75rem;color:#475569">Loading…</span>
      <button class="btn btn-icon" onclick="refresh()" title="Refresh">↺</button>
      <button class="btn btn-red" onclick="flattenAll()">⚡ Flatten All</button>
    </div>
  </div>

  <!-- Summary strip -->
  <div class="summary">
    <div>Total Day P&amp;L: <span id="s-rpnl">—</span></div>
    <div>Total Open P&amp;L: <span id="s-opnl">—</span></div>
    <div>Total Balance: <span id="s-bal">—</span></div>
    <div class="summary-right">Open Positions: <span id="s-pos">—</span></div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Status</th>
          <th>Follow</th>
          <th>Account</th>
          <th>Connection</th>
          <th>Balance</th>
          <th>Day P&amp;L</th>
          <th>Open P&amp;L</th>
          <th>Ratio</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div id="toast"></div>

  <script>
    const USD = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 });

    let accounts = [];

    function fmtPnl(v) {
      if (v === null || v === undefined) return '<span class="neu">—</span>';
      const s = USD.format(Math.abs(v));
      if (v > 0) return `<span class="pos">+${s}</span>`;
      if (v < 0) return `<span class="neg">-${s}</span>`;
      return `<span class="neu">$0.00</span>`;
    }

    function renderRow(a) {
      const isMaster = a.role === 'master';

      const followCell = isMaster
        ? `<span class="crown active" title="Leader">👑</span>`
        : `<label class="toggle" title="${a.enabled ? 'Disable' : 'Enable'} copying">
             <input type="checkbox" ${a.enabled ? 'checked' : ''} onchange="toggleSlave(${a.accountId}, this.checked, this)">
             <span class="slider"></span>
           </label>`;

      const lockedBadge = a.isLocked ? ' <span class="badge badge-locked">⛔ locked</span>' : '';

      const masterBtn = !isMaster
        ? `<button class="btn" style="font-size:0.72rem;padding:0.2rem 0.55rem;margin-right:0.4rem"
             onclick="setMaster(${a.accountId})" title="Make this account the leader">👑</button>`
        : '';

      return `
        <tr id="row-${a.accountId}">
          <td><span class="dot ${a.enabled || isMaster ? '' : 'off'}"></span></td>
          <td>${followCell}</td>
          <td>
            <strong>${a.name}</strong>${lockedBadge}
            <div style="color:#475569;font-size:0.75rem">#${a.accountId}</div>
          </td>
          <td style="color:#64748b">Tradovate</td>
          <td>${USD.format(a.balance)}</td>
          <td>${fmtPnl(a.realizedPnl)}</td>
          <td>${fmtPnl(a.openPnL)}</td>
          <td style="color:#64748b">1x</td>
          <td>
            ${masterBtn}<button class="btn-flat" onclick="flatten(${a.accountId}, this)">Flatten</button>
          </td>
        </tr>`;
    }

    function updateSummary(data) {
      const totRealized = data.reduce((s, a) => s + a.realizedPnl, 0);
      const totOpen     = data.every(a => a.openPnL === null) ? null
                        : data.reduce((s, a) => s + (a.openPnL ?? 0), 0);
      const totBal      = data.reduce((s, a) => s + a.balance, 0);

      document.getElementById('s-rpnl').outerHTML = `<span id="s-rpnl" class="${totRealized >= 0 ? 'pos' : 'neg'}">${fmtPnl(totRealized).replace(/<[^>]+>/g, '')}</span>`;
      document.getElementById('s-opnl').outerHTML = `<span id="s-opnl">${totOpen === null ? '—' : fmtPnl(totOpen).replace(/<[^>]+>/g, '')}</span>`;
      document.getElementById('s-bal').outerHTML  = `<span id="s-bal">${USD.format(totBal)}</span>`;
    }

    async function refresh() {
      try {
        const res = await fetch('/api/accounts');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        accounts = await res.json();

        document.getElementById('tbody').innerHTML = accounts.map(renderRow).join('');
        updateSummary(accounts);

        const status = document.getElementById('status');
        status.textContent = 'Updated ' + new Date().toLocaleTimeString();
        status.style.color = '#22c55e';
      } catch (err) {
        const status = document.getElementById('status');
        status.textContent = 'Error';
        status.style.color = '#ef4444';
        toast('Failed to load: ' + err.message, true);
      }
    }

    async function toggleSlave(accountId, enabled, checkbox) {
      checkbox.disabled = true;
      try {
        const res = await fetch(`/api/accounts/${accountId}/${enabled ? 'enable' : 'disable'}`, { method: 'POST' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        toast(enabled
          ? `Account #${accountId} enabled`
          : `Account #${accountId} disabled and flattened`);
        refresh();
      } catch (err) {
        toast('Toggle failed: ' + err.message, true);
        refresh(); // revert UI to server state
      } finally {
        checkbox.disabled = false;
      }
    }

    async function setMaster(accountId) {
      if (!confirm(`Make account #${accountId} the new leader?\nThe current leader will become a slave.`)) return;
      try {
        const res = await fetch(`/api/master/${accountId}`, { method: 'POST' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        toast(`Account #${accountId} is now the leader`);
        refresh();
      } catch (err) {
        toast('Failed: ' + err.message, true);
      }
    }

    async function flatten(accountId, btn) {
      if (!confirm(`Flatten ALL open positions on account #${accountId}?`)) return;
      btn.disabled = true;
      btn.textContent = '…';
      try {
        const res  = await fetch(`/api/flatten/${accountId}`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`);
        toast(data.closed === 0 ? 'No open positions' : `Closed ${data.closed} position(s)`);
        refresh();
      } catch (err) {
        toast('Flatten failed: ' + err.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Flatten';
      }
    }

    async function flattenAll() {
      if (!confirm('Flatten ALL open positions on ALL accounts?')) return;
      try {
        const res  = await fetch('/api/flatten-all', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error ?? `HTTP ${res.status}`);
        toast(`Flatten All — closed ${data.closed} position(s)`);
        refresh();
      } catch (err) {
        toast('Flatten All failed: ' + err.message, true);
      }
    }

    async function enableAll() {
      await Promise.all(accounts.filter(a => a.role === 'slave').map(a =>
        fetch(`/api/accounts/${a.accountId}/enable`, { method: 'POST' })
      ));
      toast('All slaves enabled');
      refresh();
    }

    async function disableAll() {
      await Promise.all(accounts.filter(a => a.role === 'slave').map(a =>
        fetch(`/api/accounts/${a.accountId}/disable`, { method: 'POST' })
      ));
      toast('All slaves disabled');
      refresh();
    }

    let toastTimer;
    function toast(msg, err = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'show' + (err ? ' err' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = ''; }, 3000);
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
